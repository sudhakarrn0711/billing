<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: #6a11cb;
    }

    .summary {
      background: linear-gradient(135deg, #6a11cb, #9a22f6);
      color: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .paid { color: green; }
    .pending { color: red; }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      margin-top: 10px;
      margin-right: 5px;
      border: none;
      cursor: pointer;
    }

    .btn-download {
      background: #6a11cb;
      color: white;
    }

    .btn-pay {
      background: #00b894;
      color: white;
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo img {
      height: 60px;
    }
  </style>
</head>

<body>

<div class="logo">
  <img src="assets/ransan_logo.png">
</div>

<h2>📊 Your Dashboard</h2>

<div id="summary"></div>
<div id="invoices"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQDGEchNLi1SZfPSxcgKaznJ9rCrwXagAB4SkGUwdVv3xSvnIrQjrY8zMhq7eXNMmg/exec";

const urlParams = new URLSearchParams(window.location.search);
const customerId = urlParams.get("customerId");

fetch(API_URL + "?action=getall")
  .then(res => res.json())
  .then(data => {

    const invoices = data.invoices.filter(i => i.customerId === customerId);

    let totalPending = 0;
    let html = "";

    invoices.forEach(inv => {

      let paid = (inv.payments || []).reduce((s,p)=>s+Number(p.amount||0),0);
      let total = Number(inv.total||0);
      let pending = total - paid;

      if (pending > 0) totalPending += pending;

      // ✅ SAFE invoice number
      let source = inv.snapshot || inv;

let invoiceNo =
  source.invoiceNumber ||
  source.invoice_number ||
  source.number ||
  ("INV-" + (inv.id ? inv.id.slice(-4) : "0000"));

      // ✅ UPI LINK
      let upi = "f051m00855@indianbk";
      let upiLink = `upi://pay?pa=${upi}&pn=RanSan Groups&am=${pending}&cu=INR`;

      html += `
      <div class="card">
        <b>${invoiceNo}</b><br><br>

        Total: ₹${total}<br>
        Paid: ₹${paid}<br>

        <span class="${pending>0?'pending':'paid'}">
          Pending: ₹${pending}
        </span><br>

        ${pending > 0 ? `
          <button class="btn btn-pay" onclick="payNow('${upiLink}', ${pending})">
            ⚡ Pay Now
          </button>
        ` : ``}

        <button class="btn btn-download" onclick='downloadInvoice("${encodeURIComponent(JSON.stringify(inv))}")'>
          📥 Download PDF
        </button>
      </div>
      `;
    });

    document.getElementById("summary").innerHTML =
      `<div class="summary">💰 Total Pending: ₹${totalPending}</div>`;

    document.getElementById("invoices").innerHTML = html;
  });

/* =========================
   DOWNLOAD PDF
========================= */

function downloadInvoice(invStr) {

  const inv = JSON.parse(decodeURIComponent(invStr));

  let win = window.open('', '_blank');

  let html = `
    <html>
    <head>
      <title>Invoice</title>
      <style>
        body { font-family: Arial; padding:20px; }
        h2 { color:#6a11cb; }
      </style>
    </head>
    <body>

      <h2>RanSan Groups</h2>
      <hr>

      <h3>Invoice: ${inv.invoiceNumber || inv.id}</h3>

      <p>Total: ₹${inv.total}</p>

      <p>Thank you for your business!</p>

    </body>
    </html>
  `;

  win.document.write(html);
  win.document.close();
  win.print();
}

/* =========================
   PAY NOW FUNCTION
========================= */

function payNow(upiLink, amount) {

  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile) {
    // ✅ Mobile → open UPI apps
    setTimeout(() => {
      window.location.href = upiLink;
    }, 200);

  } else {
    // 💻 Desktop → show QR
    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(upiLink);

    const win = window.open('', '_blank');

    win.document.write(`
      <html>
      <head>
        <title>Scan & Pay</title>
        <style>
          body { text-align:center; font-family:Arial; padding:20px; }
          img { margin-top:20px; }
        </style>
      </head>
      <body>

        <h2>📲 Scan & Pay</h2>
        <p>Amount: ₹${amount}</p>

        <img src="${qrUrl}" />

        <p>Scan using GPay / PhonePe / Paytm</p>

      </body>
      </html>
    `);
  }
}

</script>

</body>
</html>
