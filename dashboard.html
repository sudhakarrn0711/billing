<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f4f6fb;
  margin: 0;
  padding: 15px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img { height:50px; }
h2 { color:#6a11cb; }

/* SUMMARY */
.summary-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin:20px 0;
}

.summary-card {
  padding:15px;
  border-radius:10px;
  color:white;
}

.pending { background:#e74c3c; }
.paid { background:#27ae60; }
.total { background:#6a11cb; }

/* PAY ALL */
.pay-all {
  background:#ff7675;
  color:white;
  padding:12px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

/* GRID */
.invoice-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* STATUS */
.overdue {
  border:2px solid red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0.5; }
}

.due-soon { border:2px solid orange; }

.badge {
  padding:4px 10px;
  border-radius:20px;
  color:white;
  font-size:12px;
}

.badge.pending { background:#e74c3c; }
.badge.paid { background:#27ae60; }
.badge.overdue { background:red; }
.badge.due-soon { background:orange; color:black; }

/* BUTTON */
.btn-row { display:flex; gap:10px; }

.btn {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-pay { background:#27ae60; color:white; }
.btn-download { background:#6a11cb; color:white; }

/* PROGRESS */
.progress {
  background:#eee;
  height:8px;
  border-radius:10px;
  margin-top:5px;
}

.progress-bar {
  height:100%;
  background:linear-gradient(90deg,#00b894,#55efc4);
}

/* OVERDUE TEXT */
.overdue-text {
  color:red;
  font-size:12px;
  font-weight:bold;
}

/* LOADER */
#loader {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  z-index:9999;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #6a11cb;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<div class="header">
  <div class="logo">
    <img src="assets/ransan_logo.png">
  </div>
  <h2>Dashboard</h2>
</div>

<div id="summary"></div>
<div id="invoices"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxTBg6R15XxDt_R4dgnA1A2dmE4lJMK6WF48HC6AT9rhM6uN2xF6xtURQFwG_UOKw5H/exec";
const customerId = new URLSearchParams(location.search).get("customerId");

let isFirstLoad = true;
let allInvoices = [];

if(!customerId){
  document.body.innerHTML = "Invalid Link";
} else {
  loadData();
  setInterval(loadData,30000);
}

function loadData(){

  if(isFirstLoad){
    document.getElementById("loader").style.display="flex";
  }

  const ENV = "live"; // or "test" for testing

fetch(API_URL + "?action=getall&env=" + ENV)
    
  .then(res=>res.json())
  .then(data=>{

    document.getElementById("loader").style.display="none";
    isFirstLoad=false;

    allInvoices = data.invoices || [];

    window.allCustomers = data.customers || [];
window.allInvoices = data.invoices || []; // (important for print)

    let invoices = allInvoices.filter(i=>i.customerId===customerId);

    let total=0, paid=0, pending=0;
    let html="";

    // SORT pending first
invoices.sort((a, b) => {

  function getPriority(inv) {

    const paid = (inv.payments || []).reduce((s,p)=>s+Number(p.amount||0),0);
    const total = Number(inv.total || 0);
    const bal = total - paid;

    if (bal <= 0) return 4; // Paid (last)

    const due = inv.dueDate ? new Date(inv.dueDate) : null;
    const today = new Date();

    if (due) {
      const diff = Math.ceil((due - today) / (1000*60*60*24));

      if (diff < 0) return 1;     // 🔴 Overdue
      if (diff <= 3) return 2;    // 🟠 Due Soon
    }

    return 3; // 🟡 Pending
  }

  return getPriority(a) - getPriority(b);
});

    invoices.forEach(inv=>{

      let p=(inv.payments||[]).reduce((s,x)=>s+Number(x.amount||0),0);
      let t=Number(inv.total||0);
      let bal=t-p;

      total+=t;
      paid+=p;
      if(bal>0) pending+=bal;

      // ✅ FIXED invoice number
      let invoiceNo = (
        inv.invoiceNumber ||
        inv.snapshot?.invoiceNumber ||
        inv["Invoice Number"] ||
        inv.number ||
        inv.id
      ).toString().toUpperCase();

      let progress = t ? Math.round((p/t)*100):0;

      let statusClass="", badge="pending", text="Pending", overdueText="";

      let due = inv.dueDate ? new Date(inv.dueDate):null;
      let today = new Date();

      if(bal<=0){
        badge="paid"; text="Paid";
      }
      else if(due){
        let diff=Math.ceil((due-today)/(1000*60*60*24));

        if(diff<0){
          statusClass="overdue";
          badge="overdue";
          text="Overdue";
          overdueText=`Overdue by ${Math.abs(diff)} days`;
        }
        else if(diff<=3){
          statusClass="due-soon";
          badge="due-soon";
          text="Due Soon";
        }
      }

      let upiLink=`upi://pay?pa=f051m00855@indianbk&pn=RanSan&am=${bal}&cu=INR`;

      html+=`
      <div class="card ${statusClass}">
        <div style="display:flex;justify-content:space-between;">
          <b>${
  inv.invoiceNumber ||
  inv.snapshot?.invoiceNumber ||
  inv["Invoice Number"] ||
  inv["invoice number"] ||
  inv.invoice_number ||
  inv.number ||
  "INV-" + (inv.id ? inv.id.slice(-4) : "0000")
}</b>
          <span class="badge ${badge}">${text}</span>
        </div>

        <div style="font-size:12px;">₹${p} / ₹${t}</div>

        <div class="progress">
          <div class="progress-bar" style="width:${progress}%"></div>
        </div>

        ${overdueText?`<div class="overdue-text">${overdueText}</div>`:""}

        ${bal>0?`<div style="color:red;font-weight:bold;">₹${bal}</div>`:`<div style="color:green;">Paid</div>`}

          <div class="btn-row">
            ${bal > 0 ? `
  <button class="btn btn-pay" onclick="payNow('${upiLink}', ${bal})">
                Pay Now
              </button>
            ` : ``}

            <button class="btn btn-download" onclick='openPrint(${JSON.stringify(inv)})'>
              Download
            </button>
          </div>
      </div>
      `;
    });

    let payAll = pending>0 ? `
      <div class="pay-all" onclick="payNow('upi://pay?pa=f051m00855@indianbk&pn=RanSan&am=${pending}&cu=INR',${pending})">
        Pay All ₹${pending}
      </div>`:"";

    document.getElementById("summary").innerHTML=`
      ${payAll}
      <div class="summary-grid">
        <div class="summary-card pending">To Pay ₹${pending}</div>
        <div class="summary-card paid">Paid ₹${paid}</div>
        <div class="summary-card total">Total ₹${total}</div>
      </div>
    `;

    document.getElementById("invoices").innerHTML=
      `<div class="invoice-grid">${html}</div>`;

  });
}

// PAY
function payNow(link,amount){

  if(/Android|iPhone/i.test(navigator.userAgent)){
    location.href=link;
  } else {
    let qr=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;
    let w=window.open('');
    w.document.write(`<h2>Scan & Pay ₹${amount}</h2><img src="${qr}">`);
  }
}
  
/* =========================
   DOWNLOAD PDF
========================= */

function openPrintById(invId) {

  const inv = (window.allInvoices || []).find(x => String(x.id) === String(invId));

  if (!inv) {
    alert("Invoice not found");
    console.log("Invoice ID:", invId);
    return;
  }

  openPrint(inv);
}
  
function openPrint(input) {

  let inv = null;

  // CASE 1: ID
  if (typeof input === "string") {

    if (!window.allInvoices) {
      alert("Invoices not loaded");
      return;
    }

    let invData = window.allInvoices.find(x => x.id === input);

    if (!invData) {
      alert("Invoice not found");
      return;
    }

    inv = Object.assign({}, invData, invData.snapshot || {});
  }

  // CASE 2: Object
  else if (typeof input === "object") {
    inv = Object.assign({}, input, input.snapshot || {});
  }

  if (!inv) {
    alert("Invalid invoice data");
    return;
  }

  // safety
  inv.items = inv.items || [];
  inv.payments = inv.payments || [];

  if (!inv) return;

let cust = {
  name: "-",
  phone: "-",
  email: "-"
};

// ✅ 1. Direct fields (most common)
if (inv.customerName || inv.customerPhone || inv.customerEmail) {
  cust = {
    name: inv.customerName || inv.customer_name || "-",
    phone: inv.customerPhone || inv.customer_phone || "-",
    email: inv.customerEmail || inv.customer_email || "-"
  };
}

// ✅ 2. Nested object (snapshot style)
if (inv.customer) {
  cust = {
    name: inv.customer.name || cust.name,
    phone: inv.customer.phone || cust.phone,
    email: inv.customer.email || cust.email
  };
}

// ✅ 3. From global customers (fallback)
if ((cust.name === "-" || cust.phone === "-") && window.allCustomers) {
  const c = window.allCustomers.find(x => x.id === inv.customerId);

  if (c) {
    cust = {
      name: c.name || cust.name,
      phone: c.phone || cust.phone,
      email: c.email || cust.email
    };
  }
}

// ✅ DEBUG (very important)
console.log("Customer Data:", cust);
console.log("Invoice Data:", inv);

let bizData = inv.business || {};

// Try to read from invoice itself (snapshot)
if (inv.customer) cust = inv.customer;
if (inv.business) bizData = inv.business;  

  // ✅ Merge with defaults so biz.upi always exists
  const biz = {
    name: 'Your Business Name',
    phone: '8148610567',
    email: 'sudhakarrn0711@gmail.com',
    address: '16/6, Star Illam, Ramarkrishna 1st Cross Street, Porur, Chennai-600116',
    gst: '33AAAAA0000A1Z5',
    website: 'www.ransangroups.com',
    logo: 'assets/ransan_logo.png',
    upi: 'sudhakarrn0711@okicici',
    corporateOffice: 'Corporate Office: No. 123, Anna Salai, Chennai, TN - 600002',
    branchOffice: "Branch Office: (update JSON)",
    ...bizData
  };

  const paid = (inv.payments || []).reduce((s, p) => s + (p.amount || 0), 0);
  const due = (inv.total || 0) - paid;

  // number to words
  function numberToWords(num) {
    const a = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten',
      'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen',
      'Eighteen', 'Nineteen'];
    const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
    if (num === 0) return 'Zero';
    if (num < 20) return a[num];
    if (num < 100) return b[Math.floor(num / 10)] + (num % 10 ? ' ' + a[num % 10] : '');
    if (num < 1000) return a[Math.floor(num / 100)] + ' Hundred ' + (num % 100 !== 0 ? numberToWords(num % 100) : '');
    if (num < 100000) return numberToWords(Math.floor(num / 1000)) + ' Thousand ' + (num % 1000 !== 0 ? numberToWords(num % 1000) : '');
    if (num < 10000000) return numberToWords(Math.floor(num / 100000)) + ' Lakh ' + (num % 100000 !== 0 ? numberToWords(num % 100000) : '');
    return numberToWords(Math.floor(num / 10000000)) + ' Crore ' + (num % 10000000 !== 0 ? numberToWords(num % 10000000) : '');
  }
  const amountInWords = numberToWords(inv.total || 0) + ' Only';

  // ✅ QR Code Section (only if pending due > 0)
  // ✅ QR Code Section (inside openPrint)
  let qrSection = '';
  if (due > 0 && biz.upi) {
    const upiLink = `upi://pay?pa=${biz.upi}&pn=${encodeURIComponent(biz.name)}&am=${due}&cu=INR&tn=Invoice Payment`;
    const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(upiLink)}`;

    console.log("✅ UPI Link:", upiLink);
    console.log("✅ QR URL:", qrCodeUrl);

    qrSection = `
    <div class="payment">
      <h3 style="color:#9a22f6;">Scan to Pay</h3>
      <img src="${qrCodeUrl}" id="qrCodeImg"
           alt="QR Code Payment"
           style="margin-top:10px; width:200px; height:200px; border:1px solid #ccc;" />
      <div style="margin-top:5px; font-size:13px; color:#333;">
        Pay via UPI: <b>${biz.upi}</b>
      </div>
    </div>
  `;
  }

  // ✅ Circle Stamp
  let watermark = '';
  if (due <= 0) {
    watermark = `<div class="stamp paid">PAID</div>`;
  } else if (paid > 0 && due > 0) {
    watermark = `<div class="stamp partial">PARTIALLY PAID</div>`;
  } else {
    watermark = `<div class="stamp unpaid">UNPAID</div>`;
  }

  // ✅ Product rows (FIXED: calculate amount = qty * rate)
  const rows = (inv.items || []).map((it, i) => {
    const desc = it.description || it.desc || it.details || "";

    const qty = Number(it.qty || it.quantity || 0);
    const rate = Number(it.rate || 0);

    // ✅ If amount exists use it, else calculate
    const amount =
      it.amount != null
        ? Number(it.amount)
        : qty * rate;

    return `
    <tr>
      <td style="border:1px solid #ccc;padding:6px;text-align:center">${i + 1}</td>
      <td style="border:1px solid #ccc;padding:6px">${it.serviceName || it.service || ''}</td>
      <td style="border:1px solid #ccc;padding:6px">${desc}</td>
      <td style="border:1px solid #ccc;padding:6px;text-align:center">${qty}</td>
      <td style="border:1px solid #ccc;padding:6px;text-align:right">
        ₹${rate.toLocaleString('en-IN')}
      </td>
      <td style="border:1px solid #ccc;padding:6px;text-align:right">
        ₹${amount.toLocaleString('en-IN')}
      </td>
    </tr>
  `;
  }).join('');

  // ✅ Build HTML
  const html = `
  <html>
  <head>
    <title>Invoice ${inv.invoiceNumber || inv.id}</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 10px; color:#333; position: relative; }
      h1,h2,h3 { margin: 0; }
      table { width: 100%; border-collapse: collapse; margin-top: 15px; }
      .header { text-align: center; }
      .brand { font-size: 28px; font-weight: bold; background:#9a22f6; color:#fff; padding:6px 18px; border-radius:8px; display:inline-block; margin-top:8px; }
      .biz-info { text-align: left; }
      .biz-info h2 { font-size:20px; color:#6a11cb; margin-bottom:5px; }
      .biz-info div { margin-bottom:3px; font-size:14px; }
      hr { margin:15px 0; border:0; border-top:1px solid #ccc; }
      .two-col { display: flex; justify-content: space-between; margin-top: 20px; }
      .col { width: 48%; background:#f9f9ff; padding:10px; border-radius:6px; }
      .col h3 { color:#9a22f6; margin-bottom:8px; }
      .summary-table th { background:#6a11cb; color:#fff; text-align:left; }
      .summary-table td, .summary-table th { border:1px solid #ccc; padding:6px; }
      
      
      
      
      .payment { margin-top:20px; text-align:center; }
      .signature { margin-top: 3px; text-align: right; }
      .footer-note { margin-top:40px; text-align:center; font-size:13px; color:#555; }
      .invoice-container { position: relative; z-index: 1; }
      .stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        border: 6px solid; border-radius: 50%; padding: 40px 60px;
        font-size: 32px; font-weight: bold; text-align: center; opacity: 0.15;
        pointer-events: none; z-index: 0; }
      .stamp.paid { border-color: green; color: green; }
      .stamp.partial { border-color: orange; color: orange; }
      .stamp.unpaid { border-color: red; color: red; }
      
      .totals-qr {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-top: 20px;
}

.qr-block {
  flex: 1;
  margin-right: 20px;
}

.qr-block img {
  display: block;
  margin: 10px auto;
  width: 120px;
  height: 120px;
  border: 1px solid #ccc;
}

.amount-words {
  margin-top: 10px;
  font-style: italic;
  color: #555;
  text-align: center;
}

.totals {
  width: 280px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.totals td {
  padding: 6px;
  border: 1px solid #ccc;
  text-align: right;
}
.totals .label {
  font-weight: bold;
  color: #6a11cb;
  text-align: left;
}
.totals .highlight {
  background: #f3e8ff;
  font-weight: bold;
}

/* ✅ Footer at bottom (letterhead style) */
.address-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  font-size: 12px;
  text-align: center;
  color: #222;
  background: #f3e8ff;
  padding: 12px;
  line-height: 1.6;
  border-top: 1px solid #ddd;
}
.address-footer b {
  color: #6a11cb;
}
.address-footer div {
  margin: 2px 0;
}

  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 3px solid #6a11cb;  /* professional underline */
  padding: 10px 0;
  background: #fff;                  /* white so it doesn't overlap content */
  z-index: 10;
}

.company-logo {
  height: 60px;
  margin-right: 15px;
}

  font-size: 30px;
  font-weight: bold;
  color: #6a11cb;

  letter-spacing: 2px;
}

  margin-top: 120px; /* adjust to match header height */
}


    </style>
  </head>
  <body>
  <div class="invoice-container">
    ${watermark}

<!-- Letterhead Header -->
<div class="letterhead-header">
  <img src="${biz.logo}" alt="Company Logo" class="company-logo" />
  <div class="company-name">RanSan Groups</div>
</div>

    <div class="biz-info">
      <h2>${biz.name}</h2>
      <div><b>Phone:</b> ${biz.phone}</div>
      <div><b>Email:</b> ${biz.email}</div>
      <div><b>Address:</b> ${biz.address}</div>
      ${biz.gst ? `<div><b>GST:</b> ${biz.gst}</div>` : ''}
    </div>
    <hr/>

    <div class="two-col">
      <div class="col">
        <h3>Bill To:</h3>
        <div>Name: ${cust.name || '—'}</div>
        <div>Phone: ${cust.phone || '—'}</div>
        <div>Email: ${cust.email || '—'}</div>
      </div>
      <div class="col">
        <h3>Invoice Details:</h3>
        <div>Invoice No: ${inv.invoiceumber || inv.snapshot?.invoiceNumber || inv["Invoice Number"] || inv["invoice number"] || inv.id}</div>
        <div>Date: ${inv.date ? inv.date.slice(0, 10) : ''}</div>
        <div>Status: ${inv.status || ''}</div>
      </div>

    <div class="section">
      <h3 style="color:#9a22f6;">Product Summary</h3>
      <table class="summary-table">
        <thead>
          <tr><th>S.No</th><th>Item</th><th>Description</th><th>Quantity</th><th>Rate</th><th>Amount</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

<!-- Totals + QR side by side -->
<div class="totals-qr">
  <div class="qr-block">
    <div class="amount-words">
      Amount in Words: <b>${amountInWords}</b>
    </div>
    ${qrSection}
  </div>
  <table class="totals">
    <tr><td class="label">Total</td><td class="highlight">₹${(inv.total || 0).toLocaleString('en-IN')}</td></tr>
    <tr><td class="label">Paid</td><td>₹${paid.toLocaleString('en-IN')}</td></tr>
    <tr><td class="label">Balance</td><td class="highlight">₹${due.toLocaleString('en-IN')}</td></tr>
  </table>
</div>


    

    

    <div class="signature">
      <div>For: ${biz.name}</div>
      <br/><br/>
      <div>Authorized Signatory</div>
    </div>

<!-- ✅ Letterhead footer -->
<div class="address-footer">
  <div><b>Corporate Office:</b> Shop No 1, Sivagami Nagar, Valanai Colony, Orlem, Malad-W, Mumbai-400064</div>
  <div><b>Branch Office:</b> 16/6. 2nd Floor, Start Illam, Ramakrishna 1st Cross Street, Porur, Chennai-600116</div>
  <div><b>Website:</b> www.ransangroups.com</div>
</div>
  </div>
  </body>
  </html>
  `;

  const printWin = window.open('', '_blank', 'width=800,height=900');
  printWin.document.write(html);
  printWin.document.close();

  // ✅ Ensure print opens reliably
  printWin.onload = () => {
    const qrImg = printWin.document.getElementById('qrCodeImg');
    let printed = false;

    function doPrint() {
      if (!printed) {
        printed = true;
        printWin.focus();
        printWin.print();
        printWin.close();
      }
    }

    if (qrImg) {
      qrImg.onload = () => doPrint();
      // ⏳ fallback: print anyway after 1s
      setTimeout(doPrint, 1000);
    } else {
      doPrint();
    }
  };
}
  


/* =========================
   PAY NOW FUNCTION
========================= */

function payNow(upiLink, amount) {

  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile) {
    // ✅ Mobile → open UPI apps
    setTimeout(() => {
      window.location.href = upiLink;
    }, 200);

  } else {
    // 💻 Desktop → show QR
    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(upiLink);

    const win = window.open('', '_blank');

    win.document.write(`
      <html>
      <head>
        <title>Scan & Pay</title>
        <style>
          body { text-align:center; font-family:Arial; padding:20px; }
          img { margin-top:20px; }
        </style>
      </head>
      <body>

        <h2>📲 Scan & Pay</h2>
        <p>Amount: ₹${amount}</p>

        <img src="${qrUrl}" />

        <p>Scan using GPay / PhonePe / Paytm</p>

      </body>
      </html>
    `);
  }
}

</script>

</body>
</html>
